---
- name: Create app directory
  file:
    path: "{{ app_dest }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0755"
  become: yes

- name: Check configured git safe directories
  command: git config --global --get-all safe.directory
  register: git_safe_dirs
  changed_when: false
  failed_when: false

- name: Add safe directory for git
  command: git config --global --add safe.directory {{ app_dest }}
  when: app_dest not in git_safe_dirs.stdout_lines

- name: Clone EpicBook repo from GitHub
  git:
    repo: "{{ app_repo }}"
    dest: "{{ app_dest }}"
    version: main
    update: false
  become: yes
  become_user: "{{ app_user }}"
  notify: Restart EpicBook app

- name: Verify Node.js and npm are available
  command: node --version
  changed_when: false

- name: Install MySQL client and Python dependencies
  apt:
    name:
      - mysql-client
      - python3-mysqldb
      - python3-pymysql
      - acl
    state: present
  become: yes

- name: Check if database is already seeded
  shell: |
    mysql -h {{ db_host }} -u {{ db_user }} -p'{{ db_password }}' \
    -e "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='{{ db_name }}'" \
    --skip-column-names
  register: table_count
  changed_when: false
  ignore_errors: true

- name: Run database schema
  shell: >
    mysql -h {{ db_host }} -u {{ db_user }} -p'{{ db_password }}'
    {{ db_name }} < {{ app_dest }}/db/BuyTheBook_Schema.sql
  when: table_count.stdout | trim == "0" or table_count.failed
  become: yes

- name: Run author seed
  shell: >
    mysql -h {{ db_host }} -u {{ db_user }} -p'{{ db_password }}'
    {{ db_name }} < {{ app_dest }}/db/author_seed.sql
  when: table_count.stdout | trim == "0" or table_count.failed
  become: yes

- name: Run books seed
  shell: >
    mysql -h {{ db_host }} -u {{ db_user }} -p'{{ db_password }}'
    {{ db_name }} < {{ app_dest }}/db/books_seed.sql
  when: table_count.stdout | trim == "0" or table_count.failed
  become: yes

- name: Install app dependencies
  npm:
    path: "{{ app_dest }}"
  become: yes
  become_user: "{{ app_user }}"

- name: Create .env file
  copy:
    dest: "{{ app_dest }}/.env"
    content: |
      PORT={{ app_port }}
      DB_HOST={{ db_host }}
      DB_USER={{ db_user }}
      DB_PASSWORD={{ db_password }}
      DB_NAME={{ db_name }}
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0640"
  become: yes
  notify: Restart EpicBook app

- name: Update config.json with DB credentials
  copy:
    dest: "{{ app_dest }}/config/config.json"
    content: |
      {
        "development": {
          "username": "{{ db_user }}",
          "password": "{{ db_password }}",
          "database": "{{ db_name }}",
          "host": "{{ db_host }}",
          "dialect": "mysql",
          "dialectOptions": {
            "ssl": {
              "require": true,
              "rejectUnauthorized": false
            }
          }
        },
        "production": {
          "username": "{{ db_user }}",
          "password": "{{ db_password }}",
          "database": "{{ db_name }}",
          "host": "{{ db_host }}",
          "dialect": "mysql",
          "dialectOptions": {
            "ssl": {
              "require": true,
              "rejectUnauthorized": false
            }
          }
        }
      }
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0640"
  become: yes
  notify: Restart EpicBook app

- name: Ensure app root ownership
  file:
    path: "{{ app_dest }}"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    recurse: true
  become: yes

- name: Fix config.json ownership and permissions
  file:
    path: "{{ app_dest }}/config/config.json"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0640"
  become: yes

- name: Install pm2 globally
  npm:
    name: pm2
    global: true
  become: yes

- name: Create pm2 home directory for app user
  file:
    path: "{{ pm2_home }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0755"
  become: yes

- name: Create .ansible tmp directory for app user
  file:
    path: /var/www/.ansible/tmp
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0755"
    recurse: true
  become: yes

- name: Check PM2 process state
  command: pm2 describe epicbook
  register: pm2_process
  changed_when: false
  failed_when: false
  become: yes
  become_user: "{{ app_user }}"
  environment:
    PM2_HOME: "{{ pm2_home }}"
    HOME: /var/www

- name: Start app with pm2 if missing
  command: pm2 start server.js --name epicbook --update-env
  args:
    chdir: "{{ app_dest }}"
  when: pm2_process.rc != 0
  become: yes
  become_user: "{{ app_user }}"
  environment:
    PORT: "{{ app_port }}"
    PM2_HOME: "{{ pm2_home }}"
    HOME: /var/www
  register: pm2_start
  failed_when: pm2_start.rc != 0

- name: Save pm2 process list after first start
  command: pm2 save
  when: pm2_process.rc != 0
  changed_when: false
  become: yes
  become_user: "{{ app_user }}"
  environment:
    PM2_HOME: "{{ pm2_home }}"
    HOME: /var/www

- name: Configure pm2 to start on boot
  command: pm2 startup systemd -u {{ app_user }} --hp "{{ pm2_home }}"
  args:
    creates: /etc/systemd/system/pm2-{{ app_user }}.service
  become: yes
  environment:
    PM2_HOME: "{{ pm2_home }}"
    HOME: /var/www